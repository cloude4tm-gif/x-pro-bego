kind = "web"
previewPath = "/"
title = "Marzban Analytics Dashboard"
version = "1.0.0"
id = "artifacts/marzban-analytics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26170

[services.development]
run = "pnpm --filter @workspace/marzban-analytics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/marzban-analytics", "run", "build" ]
publicDir = "artifacts/marzban-analytics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26170"
BASE_PATH = "/"
